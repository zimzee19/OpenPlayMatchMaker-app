<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pickleball Open Play & Tournament</title>
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; 
            --win: #22c55e; --lose: #ef4444; --warn: #fbbf24; --nav: #1e293b;
        }
        
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 12px;
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        #tournament { max-width: 900px; width: 100%; padding-bottom: 80px; }
        h1, h3 { color: var(--accent); margin-top: 0; }

        .card { 
            background: var(--card); 
            padding: 16px; 
            border-radius: 12px; 
            border: 1px solid #334155; 
            margin-bottom: 16px; 
        }

        .btn { 
            padding: 12px 16px; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            background: var(--accent); 
            color: #0f172a; 
            transition: 0.2s;
            font-size: 0.95rem;
        }

        .btn:disabled { opacity: 0.3; cursor: not-allowed; background: #475569; color: #94a3b8; }
        .btn-win { background: var(--win); color: white; }
        .btn-lose { background: var(--lose); color: white; }
        .btn-edit { background: var(--warn); color: #0f172a; }
        .btn-danger { background: #991b1b; color: white; }
        .btn-outline { background: transparent; border: 1px solid #475569; color: #94a3b8; font-size: 0.7rem; padding: 6px 8px; border-radius: 6px; }

        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
        input, select { padding: 12px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; font-size: 1rem; }

        .dashboard { display: grid; grid-template-columns: 1fr; gap: 16px; }
        @media (min-width: 768px) { 
            .dashboard { grid-template-columns: 1fr 340px; }
            .input-group { flex-direction: row; }
        }

        .match-card { background: #111827; padding: 12px; border-radius: 10px; margin-bottom: 16px; border-left: 4px solid var(--accent); position: relative; }
        .court-label { font-size: 0.85rem; font-weight: bold; color: var(--accent); margin-bottom: 12px; display: block; border-bottom: 1px solid #334155; padding-bottom: 8px; }

        .score-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        .score-table th { font-size: 0.75rem; text-align: center; color: var(--accent); padding: 4px; }
        .score-table td { text-align: center; padding: 6px 2px; }
        
        .score-box { width: 50px !important; height: 44px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        .set-label { font-size: 0.7rem; color: #94a3b8; width: 45px; font-weight: bold; }

        .standing-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; table-layout: fixed; }
        .standing-table th { text-align: left; color: var(--accent); padding: 8px 4px; border-bottom: 1px solid #334155; }
        .standing-table td { padding: 8px 4px; border-bottom: 1px solid #334155; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .dq-tag { color: var(--lose); font-weight: bold; font-size: 0.6rem; border: 1px solid var(--lose); padding: 1px 3px; border-radius: 4px; }
        .drop-tag { color: var(--warn); font-weight: bold; font-size: 0.6rem; border: 1px solid var(--warn); padding: 1px 3px; border-radius: 4px; }

        .action-select { background: #1e293b; color: #94a3b8; border: 1px solid #475569; font-size: 0.8rem; padding: 6px; border-radius: 6px; width: 100%; }

        .nav-fixed { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); padding: 12px; border-top: 1px solid #334155; display: flex; gap: 8px; z-index: 100; box-shadow: 0 -4px 10px rgba(0,0,0,0.3); }

        .winner-banner { background: var(--win); color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 16px; border: 2px solid #fff; font-weight: bold; }
    </style>
</head>
<body>

<div id="tournament">
<br>
<br>
    <div id="tourneySetup">
        <br>
        <h1>Tournament</h1>
        <div class="card">
            <label style="display:block; margin-bottom:10px; font-weight:bold; color:var(--accent);">Select Format:</label>
            <div class="input-group">
                <select id="tourneyType" onchange="toggleTourneyInputs()">
                    <option value="" selected disabled>-- Choose Format --</option>
                    <option value="singles">Singles (1v1)</option>
                    <option value="doubles">Doubles (2v2)</option>
                </select>
            </div>
            
            <div id="entryFields" style="display:none; border-top: 1px solid #334155; padding-top:15px; margin-top:10px;">
                <div class="input-group" id="doublesInputs" style="display:none;">
                    <input type="text" id="tPlayer1" placeholder="Player 1" onkeypress="if(event.key==='Enter') addTeam()">
                    <input type="text" id="tPlayer2" placeholder="Player 2" onkeypress="if(event.key==='Enter') addTeam()">
                    <button class="btn" onclick="addTeam()">ADD TEAM</button>
                </div>
                <div class="input-group" id="singlesInputs" style="display:none;">
                    <input type="text" id="tPlayerS" placeholder="Player Name" onkeypress="if(event.key==='Enter') addTeam()">
                    <button class="btn" onclick="addTeam()">ADD TEAM</button>
                </div>
                <div id="teamList" style="margin: 15px 0; max-height: 150px; overflow-y: auto; color:var(--accent);"></div>
                <button class="btn btn-win" style="width:100%;" onclick="startTournament()">START SWISS TOURNAMENT</button>
            </div>
        </div>
    </div>

    <div id="tourneyActive" style="display:none;">
        <div id="finalWinnerArea"></div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 id="roundTitle" style="margin:0; font-size: 1.1rem;">Round 1</h3>
            <div id="finalsConfig" style="display:none; font-size: 0.8rem;">
                <select id="finalsMode" onchange="renderTourney()"><option value="3">Best of 3</option><option value="5">Best of 5</option></select>
            </div>
        </div>
        
        <div class="dashboard">
            <div id="activeMatches"></div>
            <div>
                <h4 style="margin: 8px 0;">Standings</h4>
                <div class="card" style="padding:4px; overflow-x: auto;">
                    <table class="standing-table">
                        <thead>
                            <tr>
                                <th style="width: 40px;">Act</th>
                                <th style="width: 30px;">#</th>
                                <th style="width: 40%;">Team</th>
                                <th>W-L</th>
                                <th>S%</th>
                                <th>OMW</th>
                            </tr>
                        </thead>
                        <tbody id="standingBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="nav-fixed" id="navContainer">
            <button class="btn btn-win" style="flex: 2;" onclick="finalizeRound()" id="finalizeBtn" disabled>Finalize Round</button>
            <button class="btn btn-win" style="flex: 2; display:none;" onclick="progressionStep()" id="nextRoundBtn">Start Next Round</button>
            <button class="btn btn-danger" style="flex: 1;" onclick="confirmReset()">Reset</button>
        </div>
    </div>
</div>

<script>
    let teams = [], tourneyMatches = [], currentRound = 0, maxSwiss = 0, tourneyPhase = 'swiss', isWaitingForNextPairing = false;

    // Standard logic preserved
    function toggleTourneyInputs() {
        const type = document.getElementById('tourneyType').value;
        document.getElementById('entryFields').style.display = 'block';
        document.getElementById('doublesInputs').style.display = type === 'doubles' ? 'flex' : 'none';
        document.getElementById('singlesInputs').style.display = type === 'singles' ? 'flex' : 'none';
    }

    function addTeam() {
        const type = document.getElementById('tourneyType').value;
        let name = type === 'singles' ? document.getElementById('tPlayerS').value.trim() : 
                   (document.getElementById('tPlayer1').value.trim() + " / " + document.getElementById('tPlayer2').value.trim());
        
        if(name && name !== " / ") {
            teams.push({ name, w:0, l:0, sw:0, sl:0, opponents: [], hasBye: false, status: 'active' });
            updateTeamListUI();
            document.querySelectorAll('#tourneySetup input').forEach(i => i.value = "");
            saveState();
        }
    }

    function removeTeam(index) {
        teams.splice(index, 1);
        updateTeamListUI();
        saveState();
    }

    function updateTeamListUI() {
        document.getElementById('teamList').innerHTML = teams.map((t, idx) => `
            <div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #334155;">
                <span>${t.name}</span>
                <span style="color:var(--lose); font-weight:bold;" onclick="removeTeam(${idx})">✕</span>
            </div>
        `).join('');
    }

    function getSetPct(t) { 
        let tot = t.sw + t.sl; 
        return tot === 0 ? "0.000" : (t.sw / tot).toFixed(3); 
    }

    function getOMW(t) {
        if (!t.opponents.length) return "0.000";
        let sum = t.opponents.reduce((acc, opp) => acc + (opp.w / (opp.w + opp.l || 1)), 0);
        return (sum / t.opponents.length).toFixed(3);
    }

    function startTournament() {
        if(teams.length < 4) return alert("Min 4 teams needed.");
        if (tourneyMatches.length === 0) {
            teams.sort(() => Math.random() - 0.5);
            maxSwiss = Math.ceil(Math.log2(teams.length));
            progressionStep();
        }
        document.getElementById('tourneySetup').style.display = 'none';
        document.getElementById('tourneyActive').style.display = 'block';
        renderTourney();
        updateStandingsUI();
        saveState();
    }

    function finalizeRound() {
        isWaitingForNextPairing = true;
        updateStandingsUI();
        document.getElementById('finalizeBtn').style.display = 'none';
        document.getElementById('nextRoundBtn').style.display = 'block';
        saveState();
    }

    function progressionStep() {
        isWaitingForNextPairing = false;
        document.getElementById('finalizeBtn').style.display = 'block';
        document.getElementById('nextRoundBtn').style.display = 'none';
        if (tourneyPhase === 'swiss' && currentRound >= maxSwiss) {
            tourneyPhase = 'bracket'; 
            startBracket();
        } else if (tourneyPhase === 'bracket') {
            advanceBracket();
        } else {
            generateSwissRound();
        }
        updateStandingsUI();
        saveState();
    }

    function generateSwissRound() {
        currentRound++;
        tourneyMatches = [];
        let sorted = [...teams].filter(t => t.status !== 'dq')
                     .sort((a,b) => b.w - a.w || getSetPct(b) - getSetPct(a) || getOMW(b) - getOMW(a));
        let activePairs = sorted.filter(t => t.status === 'active');
        let temp = [...activePairs];
        if (temp.length % 2 !== 0) {
            let byeIdx = temp.findLastIndex(t => !t.hasBye);
            let byeTeam = temp.splice(byeIdx === -1 ? 0 : byeIdx, 1)[0];
            byeTeam.w++; byeTeam.sw += 2; byeTeam.hasBye = true;
            alert(`${byeTeam.name} gets a BYE`);
        }
        while(temp.length > 1) {
            tourneyMatches.push({ t1: temp.shift(), t2: temp.shift(), s1:[null,null,null,null,null], s2:[null,null,null,null,null], setLocked:[false,false,false,false,false], completed: false });
        }
        document.getElementById('roundTitle').textContent = `Round ${currentRound}/${maxSwiss}`;
        document.getElementById('finalizeBtn').textContent = `Finalize Rd ${currentRound}`;
        document.getElementById('finalizeBtn').disabled = true;
        renderTourney();
    }

    function startBracket() {
        let finalists = [...teams].filter(t => t.status === 'active')
                        .sort((a,b) => b.w - a.w || getSetPct(b) - getSetPct(a) || getOMW(b) - getOMW(a))
                        .slice(0, teams.length > 32 ? 8 : 4);
        setupBracketMatches(finalists);
    }

    function setupBracketMatches(participants) {
        tourneyMatches = [];
        let count = participants.length;
        document.getElementById('finalizeBtn').disabled = true;
        if(count === 8) document.getElementById('roundTitle').textContent = "Quarterfinals";
        else if(count === 4) document.getElementById('roundTitle').textContent = "Semi-Finals";
        else if(count === 2) { 
            document.getElementById('roundTitle').textContent = "Finals"; 
            document.getElementById('finalsConfig').style.display = "block";
        }
        for(let i=0; i < count/2; i++) {
            tourneyMatches.push({ t1: participants[i], t2: participants[count-1-i], s1:[null,null,null,null,null], s2:[null,null,null,null,null], setLocked:[false,false,false,false,false], completed: false });
        }
        renderTourney();
    }

    function advanceBracket() {
        let isFinalRound = (tourneyMatches.length === 1);
        let limit = isFinalRound ? parseInt(document.getElementById('finalsMode').value) : 3;
        let req = Math.ceil(limit / 2);
        let winners = tourneyMatches.map(m => {
            let w1 = m.s1.filter((s, idx) => s !== null && s > m.s2[idx]).length;
            return w1 >= req ? m.t1 : m.t2;
        });
        if(winners.length === 1 && isFinalRound) {
            document.getElementById('finalWinnerArea').innerHTML = `<div class="winner-banner">🏆 CHAMPION: ${winners[0].name}</div>`;
            document.getElementById('navContainer').style.display = 'none';
            return;
        }
        setupBracketMatches(winners);
    }

    function updateStatus(teamName, status) {
        const team = teams.find(t => t.name === teamName);
        if (team && confirm(`Are you sure you want to ${status} ${teamName}?`)) {
            team.status = status;
            let mIdx = tourneyMatches.findIndex(m => (m.t1.name === teamName || m.t2.name === teamName) && !m.completed);
            if (mIdx !== -1) {
                let m = tourneyMatches[mIdx];
                if (m.t1.name === teamName) { m.s1 = [0, 0]; m.s2 = [11, 11]; }
                else { m.s2 = [0, 0]; m.s1 = [11, 11]; }
                m.setLocked = [true, true, false, false, false];
                submitMatch(mIdx);
            }
            renderTourney();
            updateStandingsUI();
            saveState();
        }
    }

    function toggleSetLock(mIdx, sIdx, lock) {
        let v1 = parseInt(document.getElementById(`m${mIdx}s${sIdx}t1`).value);
        let v2 = parseInt(document.getElementById(`m${mIdx}s${sIdx}t2`).value);
        if(lock && (isNaN(v1) || isNaN(v2))) return alert("Scores needed.");
        tourneyMatches[mIdx].setLocked[sIdx] = lock;
        if(lock) { tourneyMatches[mIdx].s1[sIdx] = v1; tourneyMatches[mIdx].s2[sIdx] = v2; } 
        else { tourneyMatches[mIdx].s1[sIdx] = null; tourneyMatches[mIdx].s2[sIdx] = null; }
        renderTourney();
        saveState();
    }

    function submitMatch(idx) {
        let m = tourneyMatches[idx];
        let w1 = 0, w2 = 0;
        m.s1.forEach((s, i) => { if(s !== null && s > m.s2[i]) w1++; else if(s !== null && m.s2[i] > s) w2++; });
        if(w1 > w2) { m.t1.w++; m.t2.l++; } else { m.t2.w++; m.t1.l++; }
        m.t1.sw += w1; m.t1.sl += w2; m.t2.sw += w2; m.t2.sl += w1;
        m.t1.opponents.push({w: m.t2.w, l: m.t2.l});
        m.t2.opponents.push({w: m.t1.w, l: m.t1.l});
        m.completed = true;
        document.getElementById('finalizeBtn').disabled = !tourneyMatches.every(match => match.completed);
        renderTourney();
        saveState();
    }

    function editMatch(idx) {
        let m = tourneyMatches[idx];
        let w1 = 0, w2 = 0;
        m.s1.forEach((s, i) => { if(s !== null && s > m.s2[i]) w1++; else if(s !== null && m.s2[i] > s) w2++; });
        if(w1 > w2) { m.t1.w--; m.t2.l--; } else { m.t2.w--; m.t1.l--; }
        m.t1.sw -= w1; m.t1.sl -= w2; m.t2.sw -= w2; m.t2.sl -= w1;
        m.t1.opponents.pop(); m.t2.opponents.pop();
        m.completed = false; 
        document.getElementById('finalizeBtn').disabled = true;
        renderTourney();
        saveState();
    }

    function updateStandingsUI() {
        let sorted = [...teams].sort((a,b) => {
            if (a.status === 'dq' && b.status !== 'dq') return 1;
            if (b.status === 'dq' && a.status !== 'dq') return -1;
            return b.w - a.w || getSetPct(b) - getSetPct(a) || getOMW(b) - getOMW(a);
        });
        document.getElementById('standingBody').innerHTML = sorted.map((t, idx) => `
            <tr>
                <td>${(isWaitingForNextPairing && t.status === 'active') ? `<select class="action-select" onchange="if(this.value){updateStatus('${t.name}',this.value);this.value=''}"><option value="">...</option><option value="dropped">Drop</option><option value="dq">DQ</option></select>` : ''}</td>
                <td style="font-weight:bold;">${t.status === 'dq' ? 'DQ' : (idx + 1)}</td>
                <td>${t.name} ${t.status === 'dq' ? '<span class="dq-tag">DQ</span>' : ''} ${t.status === 'dropped' ? '<span class="drop-tag">DROP</span>' : ''}</td>
                <td>${t.w}-${t.l}</td>
                <td>${getSetPct(t)}</td>
                <td>${getOMW(t)}</td>
            </tr>
        `).join('');
    }

    function renderTourney() {
        let isFinals = (tourneyMatches.length === 1 && tourneyPhase === 'bracket');
        let limit = isFinals ? parseInt(document.getElementById('finalsMode').value) : 3;
        let req = Math.ceil(limit / 2);

        document.getElementById('activeMatches').innerHTML = tourneyMatches.map((m, i) => {
            let setsLockedCount = m.setLocked.filter(l => l).length;
            let w1 = m.s1.filter((s, idx) => s !== null && s > m.s2[idx]).length;
            let w2 = m.s2.filter((s, idx) => s !== null && s > m.s1[idx]).length;
            let canSubmit = (w1 >= req || w2 >= req);

            let setsHtml = Array.from({length: limit}).map((_, s) => {
                let showRow = (s === setsLockedCount) || m.setLocked[s];
                if (!showRow || (canSubmit && !m.setLocked[s])) return '';
                let isLocked = m.setLocked[s];
                return `
                <tr>
                    <td class="set-label">SET ${s+1}</td>
                    <td><input type="number" id="m${i}s${s}t1" class="score-box" value="${m.s1[s]??''}" ${isLocked || m.completed ? 'disabled' : ''}></td>
                    <td><input type="number" id="m${i}s${s}t2" class="score-box" value="${m.s2[s]??''}" ${isLocked || m.completed ? 'disabled' : ''}></td>
                    <td>
                        ${!m.completed ? (isLocked ? `<button class="btn-edit" style="padding:8px;" onclick="toggleSetLock(${i},${s}, false)">Edit</button>` : `<button class="btn-win" style="padding:8px;" onclick="toggleSetLock(${i},${s}, true)">OK</button>`) : ''}
                    </td>
                </tr>`;
            }).join('');

            return `
            <div class="match-card">
                <span class="court-label">Court ${i + 1}: ${m.t1.name} vs ${m.t2.name}</span>
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <button class="btn-outline" onclick="updateStatus('${m.t1.name}', 'dropped')">Drop T1</button>
                    <button class="btn-outline" onclick="updateStatus('${m.t1.name}', 'dq')">DQ T1</button>
                    <button class="btn-outline" onclick="updateStatus('${m.t2.name}', 'dropped')">Drop T2</button>
                    <button class="btn-outline" onclick="updateStatus('${m.t2.name}', 'dq')">DQ T2</button>
                </div>
                <table class="score-table">
                    <thead><tr><th></th><th style="font-size:0.6rem;">${m.t1.name}</th><th style="font-size:0.6rem;">${m.t2.name}</th><th></th></tr></thead>
                    <tbody>${setsHtml}</tbody>
                </table>
                ${m.completed ? 
                    `<button class="btn btn-lose" style="width:100%;" onclick="editMatch(${i})">Edit Match Result</button>` :
                    `<button class="btn btn-win" style="width:100%;" onclick="submitMatch(${i})" ${!canSubmit?'disabled':''}>Finish Match</button>`
                }
            </div>`;
        }).join('');
    }

    function confirmReset() {
        if (confirm("Reset tournament?")) { localStorage.removeItem('pickleballState'); location.reload(); }
    }

    function saveState() {
        const state = { teams, tourneyMatches, currentRound, maxSwiss, tourneyPhase, isWaitingForNextPairing };
        localStorage.setItem('pickleballState', JSON.stringify(state));
    }

    function loadState() {
        const saved = localStorage.getItem('pickleballState');
        if (saved) {
            const data = JSON.parse(saved);
            teams = data.teams; tourneyMatches = data.tourneyMatches; currentRound = data.currentRound;
            maxSwiss = data.maxSwiss; tourneyPhase = data.tourneyPhase; isWaitingForNextPairing = data.isWaitingForNextPairing || false;
            updateTeamListUI();
            if (tourneyMatches.length > 0) {
                document.getElementById('tourneySetup').style.display = 'none';
                document.getElementById('tourneyActive').style.display = 'block';
                document.getElementById('finalizeBtn').disabled = !tourneyMatches.every(m => m.completed);
                document.getElementById('finalizeBtn').textContent = `Finalize Rd ${currentRound}`;
                if (isWaitingForNextPairing) {
                    document.getElementById('finalizeBtn').style.display = 'none';
                    document.getElementById('nextRoundBtn').style.display = 'block';
                }
                updateStandingsUI(); renderTourney();
            }
        }
    }
    window.onload = loadState;
</script>
</body>
</html>
