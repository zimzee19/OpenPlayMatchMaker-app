<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pickleball Match Maker - Strict Logic</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; --win: #22c55e; --lose: #ef4444; --warn: #fbbf24; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .dashboard { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; max-width: 1200px; }
        @media (min-width: 1024px) { .dashboard { grid-template-columns: 300px 1fr 300px; } }
        .panel { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #334155; }
        h2 { color: var(--accent); font-size: 0.8rem; text-transform: uppercase; border-bottom: 1px solid #334155; padding-bottom: 5px; margin-top: 0; }
        .court-area { text-align: center; border: 2px solid var(--accent); padding: 20px; border-radius: 15px; background: #1a2233; margin-bottom: 15px; }
        .player-slot { color: var(--accent); font-weight: bold; text-decoration: underline; cursor: pointer; font-size: 1.1rem; }
        .streak-fire { color: var(--warn); font-size: 0.8rem; margin-left: 4px; font-weight: bold; }
        .input-group { display: flex; gap: 5px; margin-bottom: 10px; }
        input { flex: 1; padding: 10px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 6px; }
        button { padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; background: var(--accent); color: #0f172a; }
        .hist-item { background: #111827; padding: 8px; margin-bottom: 5px; border-radius: 5px; font-size: 0.85rem; border-left: 3px solid var(--accent); }
        #swapModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
        .modal-box { background: var(--card); padding: 20px; border-radius: 10px; width: 90%; max-width: 400px; text-align: center; }
        .win-txt { color: var(--win); font-weight: bold; }
        .lose-txt { color: var(--lose); }
        .q-item { padding: 8px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div id="swapModal">
    <div class="modal-box">
        <h3>Swap Player</h3>
        <p style="font-size: 0.8rem; color: var(--warn);">Note: Swapping a winner resets their streak.</p>
        <select id="swapSelect" style="width:100%; padding:10px; margin-bottom:15px; background:#0f172a; color:white; border:1px solid #334155;"></select>
        <div style="display:flex; gap:10px;">
            <button id="confirmSwap" style="flex:1; background: var(--win); color:white;">CONFIRM</button>
            <button onclick="document.getElementById('swapModal').style.display='none'" style="flex:1; background: #475569; color:white;">CANCEL</button>
        </div>
    </div>
</div>

<div class="dashboard">
    <div class="panel">
        <h2>1. Players</h2>
        <div class="input-group">
            <input type="text" id="nameIn" placeholder="Name..." onkeypress="if(event.key==='Enter') addP()">
            <button onclick="addP()">ADD</button>
        </div>
        <div id="pList"></div>
        <button onclick="startSession()" style="width:100%; margin-top:10px; background: var(--win); color:white;">START SESSION</button>
    </div>

    <div class="panel" id="mainDisplay" style="display:none;">
        <h2>2. Court</h2>
        <div class="court-area" id="courtUI" style="display:none;">
            <div>
                <b>Team 1</b><br>
                <span class="player-slot" id="p0" onclick="openSwap(0)"></span><span id="s0" class="streak-fire"></span> & 
                <span class="player-slot" id="p1" onclick="openSwap(1)"></span><span id="s1" class="streak-fire"></span>
            </div>
            <div style="margin:10px 0; color:#64748b;">VS</div>
            <div style="margin-bottom:15px;">
                <b>Team 2</b><br>
                <span class="player-slot" id="p2" onclick="openSwap(2)"></span><span id="s2" class="streak-fire"></span> & 
                <span class="player-slot" id="p3" onclick="openSwap(3)"></span><span id="s3" class="streak-fire"></span>
            </div>
            <div style="display:flex; justify-content:center; gap:10px; margin-bottom:15px;">
                <input type="number" id="sc1" placeholder="T1" style="width:60px; text-align:center;">
                <input type="number" id="sc2" placeholder="T2" style="width:60px; text-align:center;">
            </div>
            <button onclick="submitScore()" style="width:100%;">SUBMIT SCORE</button>
        </div>

        <div id="idleUI" style="text-align:center; padding:20px;">
            <p style="color:#64748b;">Waiting for pairing...</p>
            <button onclick="pairNext()" style="width:100%; background: var(--win); color:white; padding:15px;">PAIR NEXT (SPLIT WINNERS)</button>
        </div>

        <button id="undoBtn" onclick="undo()" style="width:100%; margin-top:10px; background: var(--warn); display:none; color:black;">UNDO LAST MATCH</button>
    </div>

    <div class="panel">
        <h2>Queue & History</h2>
        <div id="qList" style="margin-bottom:15px;"></div>
        <div id="hList" style="border-top:1px solid #334155; padding-top:10px;"></div>
    </div>
</div>

<script>
    let players = [], queue = [], currentMatch = [], streaks = {}, winnersStaying = [], history = [], snapshots = [];

    function save() { localStorage.setItem('pb_logic_v11', JSON.stringify({players, queue, currentMatch, streaks, winnersStaying, history, snapshots})); }
    
    function startSession() {
        if (players.length < 4) return alert("Need 4 players");
        queue = [...players]; history = []; streaks = {}; winnersStaying = []; currentMatch = [];
        document.getElementById('mainDisplay').style.display = 'block';
        render();
    }

    function addP() {
        let name = document.getElementById('nameIn').value.trim();
        if (name && !players.includes(name)) { players.push(name); queue.push(name); render(); }
        document.getElementById('nameIn').value = "";
    }

    function removePlayer(name) {
        players = players.filter(p => p !== name);
        queue = queue.filter(p => p !== name);
        render();
    }

    function render() {
        document.getElementById('pList').innerHTML = players.map(p => `<div class="q-item">${p} <button onclick="removePlayer('${p}')" style="background:var(--lose); color:white; padding:2px 8px; font-size:12px;">X</button></div>`).join('');
        document.getElementById('qList').innerHTML = "<b>Queue:</b><br>" + queue.map((p, i) => `<div class="q-item">${i+1}. ${p}</div>`).join('');
        document.getElementById('hList').innerHTML = "<b>History:</b><br>" + history.map((m, i) => `
            <div class="hist-item">
                #${m.id}: ${m.s1}-${m.s2} 
                ${i===0 ? `<button onclick="fixScore()" style="font-size:10px; padding:2px 5px; margin-left:10px; background:var(--warn); color:black;">FIX</button>` : ''}<br>
                <span class="${m.s1>m.s2?'win-txt':'lose-txt'}">${m.t1.join('/')}</span> vs 
                <span class="${m.s2>m.s1?'win-txt':'lose-txt'}">${m.t2.join('/')}</span>
            </div>`).join('');

        if (currentMatch.length === 4) {
            document.getElementById('courtUI').style.display = 'block';
            document.getElementById('idleUI').style.display = 'none';
            currentMatch.forEach((p, i) => {
                document.getElementById('p'+i).textContent = p;
                document.getElementById('s'+i).textContent = streaks[p] ? ` 🔥 ${streaks[p]}` : "";
            });
        } else {
            document.getElementById('courtUI').style.display = 'none';
            document.getElementById('idleUI').style.display = 'block';
        }
        document.getElementById('undoBtn').style.display = snapshots.length > 0 ? 'block' : 'none';
        save();
    }

    function pairNext() {
        let next = [...winnersStaying];
        if (next.length === 2) {
            let p1 = next[0], p2 = next[1];
            next = [p1, null, p2, null];
        }

        while ((next.includes(null) || next.length < 4) && queue.length > 0) {
            let p = queue.shift();
            if (next.includes(null)) {
                next[next.indexOf(null)] = p;
            } else {
                next.push(p);
            }
        }

        if (next.length < 4) {
            next.filter(p => p !== null).forEach(p => { if(!winnersStaying.includes(p)) queue.unshift(p) });
            return alert("Not enough players in queue");
        }
        currentMatch = next;
        render();
    }

    function submitScore() {
        let s1 = parseInt(document.getElementById('sc1').value);
        let s2 = parseInt(document.getElementById('sc2').value);
        if (isNaN(s1) || isNaN(s2)) return alert("Enter scores");

        snapshots.push(JSON.stringify({queue: [...queue], streaks: {...streaks}, winnersStaying: [...winnersStaying], currentMatch: [...currentMatch]}));

        let t1 = [currentMatch[0], currentMatch[1]], t2 = [currentMatch[2], currentMatch[3]];
        let winners = s1 > s2 ? t1 : t2, losers = s1 > s2 ? t2 : t1;

        losers.forEach(p => { queue.push(p); delete streaks[p]; });

        winnersStaying = [];
        winners.forEach(p => {
            streaks[p] = (streaks[p] || 0) + 1;
            if (streaks[p] >= 2) {
                queue.push(p);
                delete streaks[p];
            } else {
                winnersStaying.push(p);
            }
        });

        history.unshift({id: history.length + 1, s1, s2, t1, t2});
        currentMatch = [];
        document.getElementById('sc1').value = ""; document.getElementById('sc2').value = "";
        render();
    }

    function undo() {
        if (snapshots.length === 0) return;
        let snap = JSON.parse(snapshots.pop());
        queue = snap.queue; streaks = snap.streaks; winnersStaying = snap.winnersStaying; currentMatch = snap.currentMatch;
        history.shift();
        render();
    }

    function fixScore() {
        let m = history[0];
        let n1 = prompt("New Score Team 1:", m.s1);
        let n2 = prompt("New Score Team 2:", m.s2);
        if (n1 === null || n2 === null) return;
        undo();
        document.getElementById('sc1').value = n1;
        document.getElementById('sc2').value = n2;
        submitScore();
    }

    function openSwap(idx) {
        let sel = document.getElementById('swapSelect');
        sel.innerHTML = queue.map(p => `<option value="${p}">${p}</option>`).join('');
        currentMatch.forEach((p, i) => { if(i!==idx) sel.innerHTML += `<option value="${p}">${p} (Switch Team)</option>` });
        
        document.getElementById('swapModal').style.display = 'flex';
        document.getElementById('confirmSwap').onclick = () => {
            let newP = sel.value;
            let oldP = currentMatch[idx];
            
            if (queue.includes(newP)) {
                // SUBSTITUTION: Queue to Court
                queue = queue.filter(p => p !== newP);
                queue.unshift(oldP); // Return old player to front of queue
                currentMatch[idx] = newP;
                
                // NEW LOGIC: Reset streak if a winner is swapped out
                delete streaks[oldP];
                winnersStaying = winnersStaying.filter(p => p !== oldP);
            } else {
                // PARTNER SWITCH: Just swap positions
                let otherIdx = currentMatch.indexOf(newP);
                currentMatch[idx] = newP;
                currentMatch[otherIdx] = oldP;
            }
            document.getElementById('swapModal').style.display = 'none';
            render();
        };
    }

    window.onload = () => {
        let saved = localStorage.getItem('pb_logic_v11');
        if (saved) {
            let data = JSON.parse(saved);
            players = data.players || [];
            queue = data.queue || [];
            currentMatch = data.currentMatch || [];
            streaks = data.streaks || {};
            winnersStaying = data.winnersStaying || [];
            history = data.history || [];
            snapshots = data.snapshots || [];
            if (players.length > 0) document.getElementById('mainDisplay').style.display = 'block';
            render();
        }
    };
</script>
</body>
</html>
