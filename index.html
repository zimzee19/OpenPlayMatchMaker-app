<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>Pickleball Match Maker</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; --win: #22c55e; --lose: #ef4444; --warn: #fbbf24; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 10px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .header-section { text-align: center; margin-bottom: 15px; width: 100%; max-width: 1250px; }
        h1 { font-size: 1.5rem; padding: 0 10px; }
        .dashboard { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; max-width: 1250px; }
        @media (min-width: 1024px) { .dashboard { grid-template-columns: 320px 1fr 320px; align-items: start; } }
        .panel { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #334155; display: flex; flex-direction: column; }
        h2 { color: var(--accent); margin-top: 0; font-size: 0.9rem; text-transform: uppercase; border-bottom: 1px solid #334155; padding-bottom: 8px; }
        .scroll-area { overflow-y: auto; flex-grow: 1; padding-right: 5px; min-height: 100px; max-height: 400px; }
        .input-group { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 6px; font-size: 1rem; }
        button { padding: 12px; background: var(--accent); border: none; font-weight: bold; cursor: pointer; border-radius: 8px; color: #0f172a; font-size: 0.9rem; }
        .match-area { text-align: center; border: 2px solid #334155; padding: 15px; border-radius: 12px; background: #1a2233; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { background: #334155; padding: 10px 12px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .q-item { cursor: grab; }
        .q-item.dragging { opacity: 0.4; border: 2px dashed var(--accent); }
        .court-slot { color: var(--accent); text-decoration: underline; cursor: pointer; font-weight: bold; }
        .del-btn { background: var(--lose); color: white; padding: 8px 12px; font-size: 1rem; border-radius: 6px; border: none; }
        .score-btn { background: var(--warn); color: #000; padding: 4px 8px; font-size: 0.7rem; border-radius: 4px; border: none; font-weight: bold; }
        .hist-item { background: #1a2233; border-left: 4px solid var(--accent); padding: 10px; margin-bottom: 10px; border-radius: 6px; font-size: 0.9rem; }
        .winner-bold { font-weight: 800; color: var(--win); }
        .loser-red { color: var(--lose); font-weight: bold; }
        .score-display { display: block; font-size: 0.8rem; color: #64748b; font-weight: bold; }
        .footer-btns { flex-shrink: 0; margin-top: 15px; display: flex; flex-direction: column; gap: 8px; }
        .tally-table { width: 100%; border-collapse: collapse; }
        .tally-table th, .tally-table td { text-align: left; padding: 10px 8px; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>Pickleball Match Maker</h1>
    </div>

    <div class="dashboard">
        <div class="panel">
            <h2>1. Players</h2>
            <div class="input-group">
                <input type="text" id="nameInput" placeholder="Name..." enterkeyhint="done">
                <button id="addBtn">ADD</button>
            </div>
            <div class="scroll-area"><ul id="pList"></ul></div>
            <div class="footer-btns">
                <button id="startBtn" style="background: var(--win); color: white;">START SESSION</button>
                <button id="resetBtn" style="background: #475569; color: white;">RESET ALL</button>
            </div>
        </div>

        <div class="panel">
            <h2 id="centerTitle">2. Court</h2>
            <div id="matchUI" style="display:none;">
                <div class="match-area">
                    <div id="courtDisplay" style="display:none;">
                        <div style="margin-bottom:10px;"><b>Team 1</b><br>
                            <span class="court-slot" onclick="swapPlayer(0)" id="p1"></span> & 
                            <span class="court-slot" onclick="swapPlayer(1)" id="p2"></span>
                        </div>
                        <div style="color: #64748b; font-weight: bold; font-size: 0.8rem;">VS</div>
                        <div style="margin-bottom:15px;"><b>Team 2</b><br>
                            <span class="court-slot" onclick="swapPlayer(2)" id="p3"></span> & 
                            <span class="court-slot" onclick="swapPlayer(3)" id="p4"></span>
                        </div>
                        <div style="margin-bottom: 20px; display: flex; justify-content: center; gap: 15px;">
                            <input type="number" id="s1" placeholder="Sc 1" style="width: 70px;">
                            <input type="number" id="s2" placeholder="Sc 2" style="width: 70px;">
                        </div>
                        <button id="submitBtn" style="width:100%;">SUBMIT SCORE</button>
                    </div>
                    <div id="idleDisplay">
                        <p style="color: #94a3b8; margin-bottom: 20px;">Court is clear.</p>
                        <button id="pairBtn" style="width:100%; background: var(--win); color: white; padding: 15px; font-size: 1.1rem;">PAIR NEXT MATCH</button>
                    </div>
                </div>
                <div class="footer-btns">
                    <button id="undoBtn" style="background: var(--warn); color: black; display: none;">UNDO LAST SUBMIT</button>
                    <button id="endBtn" style="background: var(--lose); color: white;">END SESSION</button>
                </div>
            </div>
            <div id="tallyUI" style="display:none;" class="scroll-area">
                <table class="tally-table"><thead><tr><th>Player</th><th>W</th><th>L</th></tr></thead><tbody id="tallyBody"></tbody></table>
                <button id="resumeBtn" style="width:100%; margin-top:20px; background: #475569; color:white;">RESUME SESSION</button>
            </div>
            <p id="waitText" style="text-align:center; color: #64748b; margin-top: 30px;">Add players to begin.</p>
        </div>

        <div class="panel">
            <h2>Queue & History</h2>
            <div class="scroll-area" style="max-height: 180px;"><ul id="qList"></ul></div>
            <div id="hList" class="scroll-area" style="border-top: 1px solid #334155; padding-top: 10px;"></div>
        </div>
    </div>

<script>
    let players = [], queue = [], currentWinners = [], streaks = {}, currentMatch = [], isLive = false, matchCounter = 0, winCount = {}, lossCount = {}, historyLog = [], isCourtOccupied = false;
    let fullSnapshot = null;

    // --- Persistence ---
    function saveToStorage() {
        const data = { players, queue, currentWinners, streaks, currentMatch, isLive, matchCounter, winCount, lossCount, historyLog, isCourtOccupied, fullSnapshot };
        localStorage.setItem('pickleball_matchmaker_save', JSON.stringify(data));
    }

    function loadFromStorage() {
        const saved = localStorage.getItem('pickleball_matchmaker_save');
        if (!saved) return;
        const data = JSON.parse(saved);
        players = data.players || [];
        queue = data.queue || [];
        currentWinners = data.currentWinners || [];
        streaks = data.streaks || {};
        currentMatch = data.currentMatch || [];
        isLive = data.isLive || false;
        matchCounter = data.matchCounter || 0;
        winCount = data.winCount || {};
        lossCount = data.lossCount || {};
        historyLog = data.historyLog || [];
        isCourtOccupied = data.isCourtOccupied || false;
        fullSnapshot = data.fullSnapshot || null;

        renderPlayerList(); updateQueueUI(); renderHistory();
        if (isLive) {
            document.getElementById('matchUI').style.display = 'block';
            document.getElementById('waitText').style.display = 'none';
            document.getElementById('undoBtn').style.display = historyLog.length > 0 ? 'block' : 'none';
            if (isCourtOccupied && currentMatch.length === 4) showCourt(); else showIdle();
        }
    }

    // --- UI Rendering ---
    function showCourt() {
        document.getElementById('courtDisplay').style.display = 'block';
        document.getElementById('idleDisplay').style.display = 'none';
        ['p1','p2','p3','p4'].forEach((id, i) => document.getElementById(id).textContent = currentMatch[i]);
        isCourtOccupied = true;
    }

    function showIdle() {
        document.getElementById('courtDisplay').style.display = 'none';
        document.getElementById('idleDisplay').style.display = 'block';
        isCourtOccupied = false;
    }

    function renderPlayerList() {
        document.getElementById('pList').innerHTML = players.map(p => `<li>${p} <button class="del-btn" onclick="removePlayer('${p}')">×</button></li>`).join('');
    }

    function updateQueueUI() {
        const qContainer = document.getElementById('qList');
        qContainer.innerHTML = queue.map((p, i) => `
            <li class="q-item" draggable="true" ondragstart="handleDragStart(event, ${i})" ondragover="event.preventDefault()" ondrop="handleDrop(event, ${i})">
                <span>${i+1}. ${p}</span>
                <button class="del-btn" onclick="removePlayer('${p}')">×</button>
            </li>`).join('');
    }

    function renderHistory() {
        document.getElementById('hList').innerHTML = historyLog.map((m, idx) => `
            <div class="hist-item">
                <span class="score-display">#${m.num}: ${m.s1}-${m.s2} 
                    ${idx === 0 ? `<button class="score-btn" onclick="quickEditScore()">FIX SCORE</button>` : ''}
                </span>
                <span class="${m.s1 > m.s2 ? 'winner-bold' : 'loser-red'}">${m.t1[0]} & ${m.t1[1]}</span> vs 
                <span class="${m.s2 > m.s1 ? 'winner-bold' : 'loser-red'}">${m.t2[0]} & ${m.t2[1]}</span>
            </div>
        `).join('');
    }

    // --- Drag and Drop ---
    let draggedIdx = null;
    function handleDragStart(e, index) { draggedIdx = index; e.target.classList.add('dragging'); }
    function handleDrop(e, index) {
        e.preventDefault();
        const item = queue.splice(draggedIdx, 1)[0];
        queue.splice(index, 0, item);
        updateQueueUI(); saveToStorage();
    }

    // --- Actions ---
    function addPlayer() {
        const input = document.getElementById('nameInput');
        const name = input.value.trim();
        if (!name || players.includes(name)) return;
        players.push(name); winCount[name] = 0; lossCount[name] = 0; queue.push(name);
        renderPlayerList(); updateQueueUI(); saveToStorage();
        input.value = ""; input.focus();
    }

    document.getElementById('nameInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') addPlayer(); });
    document.getElementById('addBtn').onclick = addPlayer;

    function swapPlayer(matchIdx) {
        const oldPlayer = currentMatch[matchIdx];
        const allAvailable = players.filter(p => !currentMatch.includes(p));
        if (allAvailable.length === 0) return;
        const newPlayer = prompt(`Replace ${oldPlayer} with:\n(${allAvailable.join(", ")})`);
        if (!newPlayer || !players.includes(newPlayer)) return;
        const qIdx = queue.indexOf(newPlayer);
        if (qIdx !== -1) queue[qIdx] = oldPlayer;
        currentMatch[matchIdx] = newPlayer;
        showCourt(); updateQueueUI(); saveToStorage();
    }

    function takeSnapshot() {
        fullSnapshot = JSON.stringify({ queue, streaks, currentWinners, winCount, lossCount, historyLog, matchCounter, currentMatch, isCourtOccupied });
    }

    function processMatchResult(s1, s2) {
        takeSnapshot();
        const t1 = [currentMatch[0], currentMatch[1]], t2 = [currentMatch[2], currentMatch[3]];
        let winners = s1 > s2 ? t1 : t2, losers = s1 > s2 ? t2 : t1;
        winners.forEach(p => winCount[p]++); losers.forEach(p => lossCount[p]++);
        matchCounter++;
        historyLog.unshift({ num: matchCounter, s1, s2, t1, t2 });
        losers.forEach(p => queue.push(p)); 
        currentWinners = winners;
        currentWinners.forEach(p => streaks[p] = (streaks[p] || 0) + 1);
        currentMatch = []; showIdle();
        document.getElementById('undoBtn').style.display = 'block';
    }

    document.getElementById('undoBtn').onclick = function() {
        if (!fullSnapshot) return;
        const data = JSON.parse(fullSnapshot);
        Object.assign(window, data);
        renderHistory(); updateQueueUI(); showCourt(); saveToStorage();
        document.getElementById('undoBtn').style.display = historyLog.length > 0 ? 'block' : 'none';
    };

    function quickEditScore() {
        const m = historyLog[0];
        const oldWinT1 = m.s1 > m.s2;
        const nS1 = prompt(`Score for ${m.t1[0]}/${m.t1[1]}:`, m.s1);
        const nS2 = prompt(`Score for ${m.t2[0]}/${m.t2[1]}:`, m.s2);
        if (nS1 === null || nS2 === null) return;
        const s1 = parseInt(nS1), s2 = parseInt(nS2);
        if (oldWinT1 === (s1 > s2)) { m.s1 = s1; m.s2 = s2; } 
        else {
            Object.assign(window, JSON.parse(fullSnapshot));
            historyLog.shift(); matchCounter--;
            processMatchResult(s1, s2);
        }
        renderHistory(); updateQueueUI(); saveToStorage();
    }

    function pairNextMatch() {
        let pToPlay = [];
        currentWinners.forEach(p => {
            if (players.includes(p) && (streaks[p] || 0) < 2) pToPlay.push(p);
            else { if (players.includes(p)) queue.push(p); delete streaks[p]; }
        });
        while (pToPlay.length < 4 && queue.length > 0) pToPlay.push(queue.shift());
        if (pToPlay.length < 4) { pToPlay.forEach(p => queue.unshift(p)); return alert("Need 4 players!"); }
        currentMatch = (currentWinners.length === 2 && pToPlay.includes(currentWinners[0]) && pToPlay.includes(currentWinners[1])) ? [pToPlay[0], pToPlay[2], pToPlay[1], pToPlay[3]] : pToPlay;
        showCourt(); updateQueueUI(); saveToStorage();
    }

    document.getElementById('submitBtn').onclick = function() {
        const s1 = parseInt(document.getElementById('s1').value), s2 = parseInt(document.getElementById('s2').value);
        if (isNaN(s1) || isNaN(s2)) return alert("Enter scores!");
        processMatchResult(s1, s2);
        document.getElementById('s1').value = ""; document.getElementById('s2').value = "";
        renderHistory(); updateQueueUI(); saveToStorage();
    };

    document.getElementById('startBtn').onclick = function() {
        if (players.length < 4) return alert("Need 4 players!");
        isLive = true; matchCounter = 0; historyLog = []; 
        players.forEach(p => { winCount[p] = 0; lossCount[p] = 0; streaks[p] = 0; });
        document.getElementById('matchUI').style.display = 'block';
        document.getElementById('waitText').style.display = 'none';
        showIdle(); saveToStorage();
    };

    document.getElementById('endBtn').onclick = function() {
        isLive = false; document.getElementById('matchUI').style.display = 'none'; document.getElementById('tallyUI').style.display = 'block';
        document.getElementById('tallyBody').innerHTML = players.map(p => ({name: p, w: winCount[p]||0, l: lossCount[p]||0})).sort((a,b)=>b.w-a.w).map(i => `<tr><td>${i.name}</td><td>${i.w}</td><td>${i.l}</td></tr>`).join('');
        saveToStorage();
    };

    document.getElementById('resumeBtn').onclick = function() { isLive = true; document.getElementById('tallyUI').style.display = 'none'; document.getElementById('matchUI').style.display = 'block'; saveToStorage(); };
    document.getElementById('resetBtn').onclick = function() { if(confirm("Wipe all data?")) { localStorage.removeItem('pickleball_matchmaker_save'); location.reload(); } };
    document.getElementById('pairBtn').onclick = pairNextMatch;
    
    window.onload = loadFromStorage;
</script>
</body>
</html>
